<!doctype html>
<html class="dark" lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>42 Pixel War</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&family=Space+Mono:wght@400;700&family=Hanken+Grotesk:wght@400;500&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-fixed": "#b7eaff",
              "primary-fixed-dim": "#c8c5cd",
              "on-tertiary-container": "#f00056",
              "surface": "#12121c",
              "on-surface": "#e3e1ef",
              "outline-variant": "#47464b",
              "surface-container-lowest": "#0d0d17",
              "secondary-container": "#14d1ff",
              "background": "#12121c",
              "secondary": "#a6e6ff",
              "on-secondary": "#003543",
              "on-surface-variant": "#c8c5cb",
              "primary-container": "#0a0a0f",
              "outline": "#929095"
            },
            spacing: {
              "margin-desktop": "48px",
              "margin-mobile": "16px",
              "card-padding-lg": "40px"
            },
            fontFamily: {
              "label-sm": ["Space Mono"],
              "display-lg": ["Sora"],
              "headline-md": ["Sora"],
              "body-base": ["Hanken Grotesk"],
              "status-mono": ["Space Mono"],
              "display-lg-mobile": ["Sora"]
            },
            fontSize: {
              "label-sm": ["12px", { lineHeight: "1", fontWeight: "700" }],
              "display-lg": ["48px", { lineHeight: "1.1", letterSpacing: "-0.02em", fontWeight: "800" }],
              "headline-md": ["24px", { lineHeight: "1.3", fontWeight: "700" }],
              "body-base": ["16px", { lineHeight: "1.6", fontWeight: "400" }],
              "status-mono": ["14px", { lineHeight: "1.4", letterSpacing: "0.05em", fontWeight: "400" }],
              "display-lg-mobile": ["32px", { lineHeight: "1.2", fontWeight: "800" }]
            }
          }
        }
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
